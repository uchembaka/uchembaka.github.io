<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script>(function(){try{var t=localStorage.getItem("theme");if(t!=="light"&&t!=="dark"){t=(window.matchMedia&&window.matchMedia("(prefers-color-scheme: dark)").matches)?"dark":"light";}document.documentElement.setAttribute("data-theme",t);}catch(e){document.documentElement.setAttribute("data-theme","dark");}})();</script>
<title>Tetris — Uche Mbaka</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;1,6..72,300;1,6..72,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080A0F;
    --surface: #0D1017;
    --ink: #E9E6DF;
    --ink-soft: #6A7180;
    --accent: #CFA15F;
    --accent-deep: #E0B978;
    --line: rgba(233,230,223,0.12);
    --line-strong: rgba(233,230,223,0.40);
    --grid: #0D1017;
    --overlay: rgba(8,10,15,0.92);
    --on-accent: #080A0F;
    --shadow: rgba(0,0,0,0.45);
  }
  [data-theme="light"] {
    --bg: #F3F0E9;
    --surface: #FBFAF5;
    --ink: #1B1C20;
    --ink-soft: #6E727D;
    --accent: #9E6B22;
    --accent-deep: #7D5417;
    --line: rgba(20,21,26,0.12);
    --line-strong: rgba(20,21,26,0.40);
    --grid: #ece9df;
    --overlay: rgba(243,240,233,0.95);
    --on-accent: #FBFAF5;
    --shadow: rgba(20,21,26,0.10);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg); color: var(--ink);
    font-family: "Newsreader", Georgia, serif; font-weight: 300;
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; padding: 28px 16px 48px;
    transition: background .35s ease, color .35s ease;
  }

  .back {
    align-self: flex-start;
    font-family: "JetBrains Mono", monospace;
    font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase;
    color: var(--ink-soft); margin-bottom: 18px; transition: color .25s;
  }
  .back:hover { color: var(--accent); }

  header { text-align: center; margin-bottom: 24px; }
  h1 { font-family: "Space Grotesk", system-ui, sans-serif; font-size: 2.2rem; font-weight: 500; letter-spacing: -0.01em; }
  h1 span { color: var(--accent); }
  .subtitle {
    font-family: "JetBrains Mono", monospace;
    font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--ink-soft); margin-top: 8px;
  }

  .game { display: flex; gap: 22px; align-items: flex-start; }

  .board-wrap { position: relative; }
  canvas {
    background: var(--grid);
    border: 2px solid var(--line-strong);
    border-radius: 10px;
    box-shadow: 0 10px 30px var(--shadow);
    display: block;
  }

  .panel {
    display: flex; flex-direction: column; gap: 18px;
    font-family: "JetBrains Mono", monospace; min-width: 140px;
  }

  .stat .label {
    font-size: 0.62rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-soft);
  }
  .stat .value { font-family: "Space Grotesk", sans-serif; font-weight: 500; font-size: 1.7rem; color: var(--ink); }

  .next-box {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 10px; padding: 14px;
  }
  .next-box .label {
    font-size: 0.62rem; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--ink-soft); margin-bottom: 8px;
  }
  #next { background: transparent; border: none; box-shadow: none; border-radius: 0; }

  .controls { display: flex; flex-direction: column; gap: 8px; }
  .btn {
    border: 1px solid var(--line); background: transparent; color: var(--ink-soft);
    padding: 9px 16px; border-radius: 999px;
    font-size: 0.68rem; letter-spacing: 0.1em; text-transform: uppercase;
    cursor: pointer; transition: all 0.18s ease;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn.primary { background: var(--accent); color: var(--on-accent); border-color: var(--accent); }
  .btn.primary:hover { background: var(--accent-deep); border-color: var(--accent-deep); color: var(--on-accent); }
  .btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  .hint {
    font-family: "JetBrains Mono", monospace;
    font-size: 0.6rem; color: var(--ink-soft); line-height: 1.9; letter-spacing: 0.04em; margin-top: 4px;
  }
  .hint b { color: var(--ink); font-weight: 500; }

  .overlay {
    position: absolute; inset: 0; background: var(--overlay); backdrop-filter: blur(3px);
    border-radius: 10px; display: none; flex-direction: column;
    align-items: center; justify-content: center; gap: 12px; text-align: center; padding: 24px;
  }
  .overlay.show { display: flex; animation: fade 0.4s ease; }
  @keyframes fade { from { opacity: 0; } }
  .overlay h2 { font-family: "Space Grotesk", sans-serif; font-weight: 500; font-size: 1.7rem; }
  .overlay h2 em { color: var(--accent); font-style: normal; }
  .overlay p { font-family: "JetBrains Mono", monospace; font-size: 0.72rem; color: var(--ink-soft); letter-spacing: 0.06em; }

  @media (max-width: 560px) {
    .game { flex-direction: column; align-items: center; }
    .panel { flex-direction: row; flex-wrap: wrap; justify-content: center; min-width: 0; }
  }
  @media (prefers-reduced-motion: reduce) { * { animation: none !important; transition: none !important; } }
</style>
</head>
<body>

<a class="back" href="../bored.html">← Bored</a>

<header>
  <h1>Tetr<span>is</span></h1>
  <div class="subtitle">Stack &amp; settle</div>
</header>

<div class="game">
  <div class="board-wrap">
    <canvas id="board" width="260" height="520"></canvas>
    <div class="overlay" id="overlay">
      <h2 id="overlay-title">Paused</h2>
      <p id="overlay-stats"></p>
      <button class="btn primary" id="overlay-btn">Resume</button>
    </div>
  </div>

  <div class="panel">
    <div class="stat"><div class="label">Score</div><div class="value" id="score">0</div></div>
    <div class="stat"><div class="label">Lines</div><div class="value" id="lines">0</div></div>
    <div class="stat"><div class="label">Level</div><div class="value" id="level">1</div></div>
    <div class="next-box">
      <div class="label">Next</div>
      <canvas id="next" width="112" height="112"></canvas>
    </div>
    <div class="controls">
      <button class="btn primary" id="start-btn">New game</button>
      <button class="btn" id="pause-btn">Pause</button>
    </div>
    <div class="hint">
      <b>←</b> <b>→</b> move &nbsp;·&nbsp; <b>↑</b> rotate<br>
      <b>↓</b> soft drop &nbsp;·&nbsp; <b>space</b> hard drop<br>
      <b>P</b> pause
    </div>
  </div>
</div>

<script>
const COLS = 10, ROWS = 20, CELL = 26;
const board = document.getElementById('board');
const ctx = board.getContext('2d');
const nextCanvas = document.getElementById('next');
const nctx = nextCanvas.getContext('2d');

// Tetromino shapes (each rotation state derived by rotation)
const SHAPES = {
  I: [[0,1],[1,1],[2,1],[3,1]],
  O: [[1,0],[2,0],[1,1],[2,1]],
  T: [[1,0],[0,1],[1,1],[2,1]],
  S: [[1,0],[2,0],[0,1],[1,1]],
  Z: [[0,0],[1,0],[1,1],[2,1]],
  J: [[0,0],[0,1],[1,1],[2,1]],
  L: [[2,0],[0,1],[1,1],[2,1]]
};
// Theme-aware piece palettes — amber/steel earth tones to match the site.
const PALETTES = {
  dark: {
    pieces: { I:'#CFA15F', O:'#D9B57C', T:'#C98A6B', S:'#5C7585', Z:'#9C6B53', J:'#8A95A5', L:'#E0B978' },
    grid: 'rgba(233,230,223,0.05)',
    ghost: 'rgba(233,230,223,0.10)',
    sheen: 'rgba(255,255,255,0.14)'
  },
  light: {
    pieces: { I:'#c98a6b', O:'#d4a373', T:'#bd5d3a', S:'#a3a380', Z:'#9c6b53', J:'#8a8567', L:'#da7756' },
    grid: 'rgba(61,57,41,0.06)',
    ghost: 'rgba(61,57,41,0.10)',
    sheen: 'rgba(255,255,255,0.18)'
  }
};
function pal(){ return PALETTES[document.documentElement.getAttribute('data-theme') === 'light' ? 'light' : 'dark']; }
function pieceColor(type){ return pal().pieces[type]; }

let grid, current, next, pos, score, lines, level, dropInterval, dropTimer, running, paused, gameOver;

function emptyGrid() {
  return Array.from({ length: ROWS }, () => Array(COLS).fill(null));
}

function randomPiece() {
  const keys = Object.keys(SHAPES);
  const type = keys[Math.floor(Math.random() * keys.length)];
  return { type, cells: SHAPES[type].map(c => [...c]) };
}

function rotate(cells) {
  // rotate 90deg clockwise around bounding box
  const ys = cells.map(c => c[1]);
  const maxY = Math.max(...ys);
  return cells.map(([x, y]) => [maxY - y, x]);
}

function collides(cells, px, py) {
  return cells.some(([x, y]) => {
    const nx = px + x, ny = py + y;
    return nx < 0 || nx >= COLS || ny >= ROWS || (ny >= 0 && grid[ny][nx]);
  });
}

function spawn() {
  current = next || randomPiece();
  next = randomPiece();
  pos = { x: 3, y: -1 };
  drawNext();
  if (collides(current.cells, pos.x, pos.y)) endGame();
}

function lockPiece() {
  current.cells.forEach(([x, y]) => {
    const ny = pos.y + y;
    if (ny >= 0) grid[ny][pos.x + x] = current.type;
  });
  clearLines();
  spawn();
}

function clearLines() {
  let cleared = 0;
  for (let r = ROWS - 1; r >= 0; r--) {
    if (grid[r].every(c => c)) {
      grid.splice(r, 1);
      grid.unshift(Array(COLS).fill(null));
      cleared++;
      r++;
    }
  }
  if (cleared) {
    const points = [0, 100, 300, 500, 800][cleared] * level;
    score += points;
    lines += cleared;
    const newLevel = Math.floor(lines / 10) + 1;
    if (newLevel !== level) {
      level = newLevel;
      dropInterval = Math.max(100, 800 - (level - 1) * 70);
    }
    updateStats();
  }
}

function move(dx) {
  if (!running || paused) return;
  if (!collides(current.cells, pos.x + dx, pos.y)) pos.x += dx;
  draw();
}

function softDrop() {
  if (!running || paused) return;
  if (!collides(current.cells, pos.x, pos.y + 1)) { pos.y++; }
  else { lockPiece(); }
  draw();
}

function hardDrop() {
  if (!running || paused) return;
  while (!collides(current.cells, pos.x, pos.y + 1)) pos.y++;
  lockPiece();
  draw();
}

function tryRotate() {
  if (!running || paused) return;
  const rotated = rotate(current.cells);
  // wall kicks: try shifting if blocked
  for (const dx of [0, -1, 1, -2, 2]) {
    if (!collides(rotated, pos.x + dx, pos.y)) {
      current.cells = rotated;
      pos.x += dx;
      draw();
      return;
    }
  }
}

// ---------- Drawing ----------
function drawCell(c, x, y, color) {
  c.fillStyle = color;
  c.fillRect(x * CELL + 1, y * CELL + 1, CELL - 2, CELL - 2);
  c.fillStyle = pal().sheen;
  c.fillRect(x * CELL + 1, y * CELL + 1, CELL - 2, 4);
}

function draw() {
  const p = pal();
  ctx.clearRect(0, 0, board.width, board.height);
  // subtle grid lines
  ctx.strokeStyle = p.grid;
  for (let x = 1; x < COLS; x++) {
    ctx.beginPath(); ctx.moveTo(x * CELL, 0); ctx.lineTo(x * CELL, ROWS * CELL); ctx.stroke();
  }
  for (let y = 1; y < ROWS; y++) {
    ctx.beginPath(); ctx.moveTo(0, y * CELL); ctx.lineTo(COLS * CELL, y * CELL); ctx.stroke();
  }
  // settled blocks
  for (let r = 0; r < ROWS; r++)
    for (let col = 0; col < COLS; col++)
      if (grid[r][col]) drawCell(ctx, col, r, pieceColor(grid[r][col]));
  // ghost piece
  if (current && running) {
    let gy = pos.y;
    while (!collides(current.cells, pos.x, gy + 1)) gy++;
    current.cells.forEach(([x, y]) => {
      const ny = gy + y;
      if (ny >= 0) {
        ctx.fillStyle = p.ghost;
        ctx.fillRect((pos.x + x) * CELL + 1, ny * CELL + 1, CELL - 2, CELL - 2);
      }
    });
    // active piece
    current.cells.forEach(([x, y]) => {
      const ny = pos.y + y;
      if (ny >= 0) drawCell(ctx, pos.x + x, ny, pieceColor(current.type));
    });
  }
}

function drawNext() {
  nctx.clearRect(0, 0, nextCanvas.width, nextCanvas.height);
  if (!next) return;
  const xs = next.cells.map(c => c[0]), ys = next.cells.map(c => c[1]);
  const w = Math.max(...xs) - Math.min(...xs) + 1;
  const h = Math.max(...ys) - Math.min(...ys) + 1;
  const cs = 24;
  const offX = (nextCanvas.width - w * cs) / 2 - Math.min(...xs) * cs;
  const offY = (nextCanvas.height - h * cs) / 2 - Math.min(...ys) * cs;
  next.cells.forEach(([x, y]) => {
    nctx.fillStyle = pieceColor(next.type);
    nctx.fillRect(offX + x * cs + 1, offY + y * cs + 1, cs - 2, cs - 2);
    nctx.fillStyle = pal().sheen;
    nctx.fillRect(offX + x * cs + 1, offY + y * cs + 1, cs - 2, 4);
  });
}

function updateStats() {
  document.getElementById('score').textContent = score;
  document.getElementById('lines').textContent = lines;
  document.getElementById('level').textContent = level;
}

// ---------- Loop ----------
function tick() {
  if (!running || paused) return;
  if (!collides(current.cells, pos.x, pos.y + 1)) pos.y++;
  else lockPiece();
  draw();
}

function loop() {
  clearInterval(dropTimer);
  dropTimer = setInterval(tick, dropInterval);
}

// ---------- Controls ----------
function startGame() {
  grid = emptyGrid();
  score = 0; lines = 0; level = 1;
  dropInterval = 800;
  running = true; paused = false; gameOver = false;
  next = randomPiece();
  spawn();
  updateStats();
  draw();
  loop();
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('pause-btn').textContent = 'Pause';
}

function togglePause() {
  if (!running || gameOver) return;
  paused = !paused;
  const ov = document.getElementById('overlay');
  document.getElementById('pause-btn').textContent = paused ? 'Resume' : 'Pause';
  if (paused) {
    document.getElementById('overlay-title').textContent = 'Paused';
    document.getElementById('overlay-stats').textContent = `Score ${score} · Lines ${lines}`;
    document.getElementById('overlay-btn').textContent = 'Resume';
    ov.classList.add('show');
  } else {
    ov.classList.remove('show');
    loop();
  }
}

function endGame() {
  running = false; gameOver = true;
  clearInterval(dropTimer);
  document.getElementById('overlay-title').innerHTML = 'Game <em>over</em>';
  document.getElementById('overlay-stats').textContent = `Score ${score} · ${lines} lines · level ${level}`;
  document.getElementById('overlay-btn').textContent = 'Play again';
  document.getElementById('overlay').classList.add('show');
}

document.getElementById('start-btn').addEventListener('click', startGame);
document.getElementById('pause-btn').addEventListener('click', togglePause);
document.getElementById('overlay-btn').addEventListener('click', () => {
  if (gameOver) startGame();
  else togglePause();
});

document.addEventListener('keydown', e => {
  if (['ArrowLeft','ArrowRight','ArrowUp','ArrowDown',' '].includes(e.key)) e.preventDefault();
  switch (e.key) {
    case 'ArrowLeft': move(-1); break;
    case 'ArrowRight': move(1); break;
    case 'ArrowDown': softDrop(); break;
    case 'ArrowUp': tryRotate(); break;
    case ' ': hardDrop(); break;
    case 'p': case 'P': togglePause(); break;
  }
});

// initial idle render
grid = emptyGrid();
draw();
</script>
</body>
</html>
